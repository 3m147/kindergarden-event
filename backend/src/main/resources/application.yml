server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/kindergaten?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Seoul
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update   # 배포 시 테이블 자동 생성을 위해 update로 변경
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
    show-sql: true
  sql:
    init:
      mode: never          # schema.sql 수동 실행 권장. 자동 실행하려면 always.
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 100MB
