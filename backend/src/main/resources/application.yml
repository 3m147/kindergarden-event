server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/recitation_db?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Seoul
    username: root
    password: changeme   # 로컬 DB 비밀번호로 교체
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate   # schema.sql 로 테이블 관리. 개발 초기엔 update 로 바꿔도 무방.
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
    show-sql: true
  sql:
    init:
      mode: never          # schema.sql 수동 실행 권장. 자동 실행하려면 always.
