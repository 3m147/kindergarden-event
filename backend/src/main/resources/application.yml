server:
  # Railway 는 컨테이너에 PORT 를 동적으로 주입함. 일반 Spring 환경변수(SERVER_PORT)도 호환되도록 둘 다 fallback 처리.
  port: ${PORT:${SERVER_PORT:8080}}

spring:
  datasource:
    # Oracle Autonomous DB Wallet 경로와 비밀번호는 환경변수로 관리.
    # 배포 환경에서는 ORACLE_JDBC_URL, ORACLE_DB_USERNAME, ORACLE_DB_PASSWORD를 반드시 설정.
    url: ${ORACLE_JDBC_URL:jdbc:oracle:thin:@kindergarden_low?TNS_ADMIN=/Users/kkmm99jj/Downloads/Wallet_KINDERGARDEN}
    username: ${ORACLE_DB_USERNAME:KINDERGARDEN_APP}
    password: ${ORACLE_DB_PASSWORD:}
    driver-class-name: oracle.jdbc.OracleDriver
  jpa:
    hibernate:
      # 첫 배포: update (테이블 자동 생성). 이후엔 validate 권장.
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.OracleDialect
        format_sql: true
    show-sql: ${SPRING_JPA_SHOW_SQL:true}
  sql:
    init:
      mode: never
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 100MB

# 사진 업로드 저장 경로 — Railway에선 Volume mount 경로(예: /data/uploads)로 덮어씀
file:
  upload-dir: ${FILE_UPLOAD_DIR:uploads}

app:
  storage:
    bucket: ${GCS_BUCKET_NAME:}
    signed-url-minutes: ${GCS_SIGNED_URL_MINUTES:15}
  jwt-secret: ${APP_JWT_SECRET:local-development-secret-change-before-production-1234567890}
  jwt-expiration-hours: ${APP_JWT_EXPIRATION_HOURS:24}
  # 업로드 사진의 절대 URL을 만들 때 쓰는 백엔드 공개 주소.
  # Railway 운영 시: APP_PUBLIC_URL=https://xxx.up.railway.app
  public-url: ${APP_PUBLIC_URL:http://localhost:8080}
  # CORS 허용 오리진 (콤마 구분). 운영 시 Vercel 도메인 추가.
  # 예: APP_ALLOWED_ORIGINS=https://my-app.vercel.app,http://localhost:3000,http://localhost:3001
  allowed-origins: ${APP_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001}
